<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="760" viewBox="0 0 1150 760">
<rect width="100%" height="100%" fill="white"/>
<style>text{font-family:Arial,Helvetica,sans-serif;fill:#263238}.title{font-size:30px;font-weight:700}.sub{font-size:17px;fill:#6d7780}.small{font-size:13px;fill:#6d7780}.label{font-size:15px}.bold{font-weight:700}.grid{stroke:#e8edf1;stroke-width:1}.axis{stroke:#ccd5dc;stroke-width:1}.note{font-size:14px;fill:#6d7780}</style>
<text x="60.0" y="60.0" class="title" text-anchor="start">Driver Context</text>
<text x="60.0" y="90.0" class="sub" text-anchor="start">Use lived context to avoid overdiagnosing normal household changes.</text>
<rect x="80.0" y="160.0" width="990.0" height="120.0" rx="10" fill="#f5f7f8" stroke="#d5dde3"/>
<circle cx="128.0" cy="220.0" r="22.0" fill="#39b9c6" stroke="white" stroke-width="0"/>
<text x="170.0" y="205.0" class="label" text-anchor="start" style="fill:#18324a;font-weight:700">Household baseline</text>
<text x="170.0" y="235.0" class="small" text-anchor="start">Household details are intentionally generalized in this public-safe report.</text>
<rect x="80.0" y="330.0" width="990.0" height="120.0" rx="10" fill="#f5f7f8" stroke="#d5dde3"/>
<circle cx="128.0" cy="390.0" r="22.0" fill="#e96f47" stroke="white" stroke-width="0"/>
<text x="170.0" y="375.0" class="label" text-anchor="start" style="fill:#18324a;font-weight:700">Irrigation / yard</text>
<text x="170.0" y="405.0" class="small" text-anchor="start">Yard and irrigation context is summarized without address-level detail.</text>
<rect x="80.0" y="500.0" width="990.0" height="120.0" rx="10" fill="#f5f7f8" stroke="#d5dde3"/>
<circle cx="128.0" cy="560.0" r="22.0" fill="#f2b31b" stroke="white" stroke-width="0"/>
<text x="170.0" y="545.0" class="label" text-anchor="start" style="fill:#18324a;font-weight:700">Best first checks</text>
<text x="170.0" y="575.0" class="small" text-anchor="start">Toilet dye tests, meter test with irrigation off, controller audit, irrigation walk-through.</text>
</svg>