<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
<title id="title">Safe AI agent handoff</title><desc id="desc">Synthetic illustration of a user controlling login and approving a usage file for a local agent.</desc>
<rect width="900" height="520" rx="34" fill="#f6fbf8"/><rect x="64" y="82" width="330" height="300" rx="34" fill="#06364d"/><text x="102" y="140" font-family="Newsreader, Georgia" font-size="36" font-weight="750" fill="#fff">Browser stays yours</text><rect x="110" y="180" width="210" height="120" rx="24" fill="#e8f7f8"/><circle cx="154" cy="240" r="28" fill="#006879"/><path d="M144 240l8 9 18-22" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/><text x="110" y="340" font-family="Source Sans 3, Arial" font-size="18" fill="#c7f2f4">Manual login. No credentials.</text>
<path d="M420 250h90" stroke="#53642f" stroke-width="10" stroke-linecap="round"/><path d="M492 225l35 25-35 25" fill="none" stroke="#53642f" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="536" y="82" width="300" height="300" rx="34" fill="#fff" stroke="#c4d1d4"/><text x="580" y="140" font-family="Newsreader, Georgia" font-size="35" font-weight="750" fill="#082d3f">Local agent helps</text><path d="M606 188h122l42 42v96H606z" fill="#39b9c6"/><path d="M728 188v42h42" fill="#bdf4f7"/><text x="667" y="260" text-anchor="middle" font-family="Source Sans 3, Arial" font-size="25" font-weight="900" fill="#06364d">FILE</text><text x="580" y="340" font-family="Source Sans 3, Arial" font-size="18" fill="#5d6f73">Only after you approve the file.</text><text x="92" y="444" font-family="Source Sans 3, Arial" font-size="21" font-weight="800" fill="#06364d">Codex or Claude Code can help after manual login, but session data never crosses the boundary.</text>
</svg>
