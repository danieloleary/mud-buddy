    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#75dce3"/><stop offset="1" stop-color="#003f5c"/></linearGradient>
  </defs>
  <rect width="980" height="360" rx="44" fill="url(#bg)"/>
  <g fill="none" stroke="#006879" stroke-width="10" stroke-linecap="round" opacity="0.26">
    <path d="M270 176h122"/><path d="M588 176h122"/>
