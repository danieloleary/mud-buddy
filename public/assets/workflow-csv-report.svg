<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic CSV to report workflow</title>
  <desc id="desc">A three step local workflow from official CSV export to Mud Buddy report to public-safe sharing.</desc>
