<g font-family="Source Sans 3, Arial" font-weight="900" fill="#06364d"><g transform="translate(80 140)"><rect width="190" height="230" rx="30" fill="#fff" stroke="#c4d1d4"/><circle cx="95" cy="78" r="42" fill="#e8f7f8"/><path d="M78 86c18-44 31-44 50 0" fill="none" stroke="#006879" stroke-width="9" stroke-linecap="round"/><text x="95" y="164" text-anchor="middle" font-size="22">Toilet dye</text><text x="95" y="194" text-anchor="middle" font-size="16" font-weight="600" fill="#5d6f73">quick fixture check</text></g><g transform="translate(285 140)"><rect width="190" height="230" rx="30" fill="#fff" stroke="#c4d1d4"/><circle cx="95" cy="78" r="42" fill="#e8f7f8"/><path d="M70 78h50M120 78l-18-18" fill="none" stroke="#006879" stroke-width="9" stroke-linecap="round"/><text x="95" y="164" text-anchor="middle" font-size="22">Meter test</text><text x="95" y="194" text-anchor="middle" font-size="16" font-weight="600" fill="#5d6f73">with water off</text></g><g transform="translate(490 140)"><rect width="190" height="230" rx="30" fill="#fff" stroke="#c4d1d4"/><circle cx="95" cy="78" r="42" fill="#e8f7f8"/><path d="M78 92c16-52 48-52 64 0" fill="none" stroke="#006879" stroke-width="9" stroke-linecap="round"/><text x="95" y="164" text-anchor="middle" font-size="22">Irrigation</text><text x="95" y="194" text-anchor="middle" font-size="16" font-weight="600" fill="#5d6f73">walk-through</text></g></g>
<text x="80" y="435" font-family="Source Sans 3, Arial" font-size="20" font-weight="800" fill="#5d6f73">If it is urgent, billing-related, pressure/outage-related, or water-quality-related, use EBMUD directly.</text>
