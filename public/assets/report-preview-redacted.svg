<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Public-safe redacted Mud Buddy report preview</title><desc id="desc">Synthetic report preview with bucketed values and no private identifiers.</desc>
<rect width="1200" height="760" fill="#f6fbf8"/><circle cx="1030" cy="100" r="170" fill="#d8f3f0"/><circle cx="120" cy="650" r="190" fill="#f5df9b" opacity=".55"/>
<rect x="90" y="70" width="1020" height="620" rx="38" fill="#ffffff" stroke="#c5d7d8"/>
<rect x="90" y="70" width="1020" height="132" rx="38" fill="#06364d"/><text x="135" y="128" fill="#fff" font-family="Source Sans 3, Arial" font-size="38" font-weight="800">Mud Buddy Public Water Use Summary</text><text x="137" y="170" fill="#c7f2f4" font-family="Source Sans 3, Arial" font-size="21">EBMUD service-area home • identifiers removed • not affiliated with EBMUD</text>
<g font-family="Source Sans 3, Arial"><rect x="130" y="235" width="210" height="100" rx="22" fill="#e9f8f7"/><text x="156" y="282" font-size="34" font-weight="900" fill="#006879">~480 CCF</text><text x="156" y="312" font-size="16" fill="#5d6f73">bucketed history</text><rect x="370" y="235" width="210" height="100" rx="22" fill="#fff7df"/><text x="396" y="282" font-size="34" font-weight="900" fill="#8a6510">~180 GPD</text><text x="396" y="312" font-size="16" fill="#5d6f73">baseline bucket</text><rect x="610" y="235" width="210" height="100" rx="22" fill="#edf5df"/><text x="636" y="282" font-size="34" font-weight="900" fill="#53642f">5 checks</text><text x="636" y="312" font-size="16" fill="#5d6f73">next steps</text></g>
<g transform="translate(135 385)"><text x="0" y="0" font-family="Newsreader, Georgia" font-size="34" font-weight="700" fill="#082d3f">Your water-use timeline</text><line x1="0" y1="210" x2="820" y2="210" stroke="#d8e4e5"/><line x1="0" y1="150" x2="820" y2="150" stroke="#eaf1f1"/><line x1="0" y1="90" x2="820" y2="90" stroke="#eaf1f1"/><polyline points="0,172 82,166 164,156 246,118 328,76 410,68 492,82 574,112 656,150 738,164 820,168" fill="none" stroke="#39b9c6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><rect x="246" y="62" width="180" height="48" rx="20" fill="#fff0cf"/><text x="268" y="94" font-family="Source Sans 3, Arial" font-size="19" font-weight="800" fill="#73570e">summer lift</text><text x="0" y="255" font-family="Source Sans 3, Arial" font-size="18" fill="#5d6f73">Visible values are rounded for public sharing. Raw CSV rows are not included.</text></g>
<g transform="translate(925 405)" font-family="Source Sans 3, Arial"><rect width="140" height="190" rx="28" fill="#eef7f4" stroke="#c5d7d8"/><circle cx="70" cy="58" r="28" fill="#39b9c6"/><path d="M58 58l9 10 18-23" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="70" y="116" text-anchor="middle" font-size="18" font-weight="900" fill="#06364d">PUBLIC</text><text x="70" y="144" text-anchor="middle" font-size="15" fill="#5d6f73">anonymized</text><text x="70" y="164" text-anchor="middle" font-size="15" fill="#5d6f73">summary</text></g>
