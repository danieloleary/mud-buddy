<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
<title id="title">Public sharing checklist card</title><desc id="desc">Synthetic checklist for public-safe Mud Buddy sharing.</desc>
<rect width="820" height="520" rx="36" fill="#06364d"/><circle cx="710" cy="90" r="125" fill="#39b9c6" opacity=".25"/><rect x="86" y="62" width="648" height="390" rx="34" fill="#fff" stroke="#c4d1d4"/>
<text x="126" y="122" font-family="Newsreader, Georgia" font-size="40" font-weight="750" fill="#082d3f">Before you share</text><text x="128" y="158" font-family="Source Sans 3, Arial" font-size="18" fill="#5d6f73">Use public mode and check the privacy basics.</text>
<g font-family="Source Sans 3, Arial" font-size="22" font-weight="800" fill="#06364d">
<g transform="translate(128 205)"><circle r="15" fill="#39b9c6"/><path d="M-7 0l5 7 11-15" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/><text x="32" y="7">No name, address, account, or meter ID</text></g>
<g transform="translate(128 255)"><circle r="15" fill="#39b9c6"/><path d="M-7 0l5 7 11-15" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/><text x="32" y="7">No raw CSV rows or local file paths</text></g>
<g transform="translate(128 305)"><circle r="15" fill="#39b9c6"/><path d="M-7 0l5 7 11-15" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/><text x="32" y="7">No authenticated screenshots</text></g>
<g transform="translate(128 355)"><circle r="15" fill="#39b9c6"/><path d="M-7 0l5 7 11-15" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/><text x="32" y="7">Generated with --public</text></g>
</g>
<text x="128" y="418" font-family="Source Sans 3, Arial" font-size="16" font-weight="800" fill="#c46a4a">Most homeowners should keep reports private.</text>
</svg>
