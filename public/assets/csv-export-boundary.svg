<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
<title id="title">Manual login and CSV boundary</title><desc id="desc">Synthetic diagram showing credentials staying with the user and only the downloaded CSV entering Mud Buddy.</desc>
<rect width="980" height="420" rx="34" fill="#f7fbf8"/><rect x="40" y="58" width="900" height="304" rx="34" fill="#fff" stroke="#c4d1d4"/>
<line x1="490" y1="92" x2="490" y2="330" stroke="#c46a4a" stroke-width="4" stroke-dasharray="12 12"/><text x="490" y="66" text-anchor="middle" font-family="Source Sans 3, Arial" font-size="18" font-weight="900" fill="#c46a4a">credential/session boundary</text>
<g font-family="Source Sans 3, Arial"><rect x="82" y="120" width="310" height="170" rx="30" fill="#e8f7f8"/><text x="118" y="162" font-size="26" font-weight="900" fill="#06364d">You log in manually</text><text x="118" y="200" font-size="18" fill="#5d6f73">Login secrets, MFA, and browser state stay outside Mud Buddy.</text><circle cx="340" cy="238" r="35" fill="#006879"/><path d="M325 240h30M340 225v30" stroke="#fff" stroke-width="7" stroke-linecap="round"/></g>
<g font-family="Source Sans 3, Arial"><rect x="584" y="120" width="310" height="170" rx="30" fill="#fff7df"/><text x="620" y="162" font-size="26" font-weight="900" fill="#06364d">CSV crosses only by choice</text><text x="620" y="200" font-size="18" fill="#5d6f73">You provide the downloaded usage export when you want a local report.</text><path d="M656 232h108l38 38H656z" fill="#39b9c6"/><path d="M764 232v38h38" fill="#bdf4f7"/><text x="709" y="264" font-size="18" font-weight="900" fill="#06364d">CSV</text></g>
<path d="M420 218c42-18 82-18 124 0" fill="none" stroke="#53642f" stroke-width="8" stroke-linecap="round"/><path d="M528 195l28 23-30 20" fill="none" stroke="#53642f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>


