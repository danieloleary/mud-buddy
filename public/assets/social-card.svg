<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mud Buddy social card</title>
  <desc id="desc">Social preview for a local-first EBMUD water usage report tool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbfff8"/><stop offset="0.48" stop-color="#dff7f5"/><stop offset="1" stop-color="#ffe9aa"/></linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#75dce3"/><stop offset="0.6" stop-color="#007d8d"/><stop offset="1" stop-color="#003f5c"/></linearGradient>
  </defs>
  <rect width="1200" height="630" rx="56" fill="url(#bg)"/>
  <path d="M0 510c129-65 253-74 371-28 124 48 245 39 363-28 154-87 309-78 466 29v147H0z" fill="url(#water)" opacity="0.9"/>
