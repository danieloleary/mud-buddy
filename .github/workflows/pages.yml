name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate release artifacts
        run: npm run generate:sample && npm run generate:synthetic && npm run generate:visuals && npm run build && npm run package:public

      - name: Browser parser and parity tests
        run: npm run test:csv-parser && npm run test:js-python-parity

      - name: Landing and upload smoke tests
        run: npm run test:landing && npm run test:browser-upload

      - name: Browser upload matrix and error tests
        run: npm run test:browser-upload-synthetic && npm run test:browser-upload-errors

      - name: Browser upload privacy and network tests
        run: npm run test:browser-upload-privacy && npm run test:browser-upload-hardened-privacy && npm run test:browser-upload-network

      - name: Report and mock browser-flow tests
        run: npm run test:synthetic-report-results && npm run test:report && npm run test:browser-flow && npm run test:browser-flow-safety && npm run test:privacy && npm run test:csv-provision && npm run test:synthetic && npm run test:data-contract

      - name: Docs, redaction, package, and subpath tests
        run: npm run test:docs && npm run test:docs-links && npm run test:redaction && npm run test:redaction-fixtures && npm run test:package-policy && npm run test:subpath

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
